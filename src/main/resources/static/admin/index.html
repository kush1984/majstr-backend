<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majstr — Адмін-панель</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f7f7f8;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #1f6feb;
            --accent-text: #ffffff;
            --success: #16a34a;
            --warn: #d97706;
            --danger: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.45;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
        }
        h1 {
            font-size: 1.4rem;
            margin: 0 0 16px;
        }
        h2 {
            font-size: 1rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 24px 0 8px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .stat { text-align: center; }
        .stat .label { color: var(--muted); font-size: 0.85rem; }
        .stat .value { font-size: 1.8rem; font-weight: 600; margin: 4px 0; }
        .stat .sub { color: var(--muted); font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.92rem; }
        th { font-weight: 500; color: var(--muted); font-size: 0.82rem; }
        td.muted { color: var(--muted); }
        select, input, button {
            font: inherit;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
        }
        button { cursor: pointer; }
        button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .filters input { flex: 1; min-width: 180px; }
        .pager { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
        }
        .badge.FREE { background: #f3f4f6; color: var(--muted); }
        .badge.PRO  { background: #dbeafe; color: var(--accent); }
        .badge.TEAM { background: #fce7f3; color: #be185d; }
        .badge.USER  { background: #f3f4f6; color: var(--muted); }
        .badge.ADMIN { background: #fee2e2; color: var(--danger); }
        #login { max-width: 360px; margin: 80px auto; }
        #login label { display: block; margin: 10px 0 4px; color: var(--muted); font-size: 0.9rem; }
        #login input { width: 100%; }
        #login button { width: 100%; margin-top: 16px; }
        .error { color: var(--danger); margin-top: 8px; font-size: 0.9rem; }
        @media (max-width: 600px) {
            th.hide-mobile, td.hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<div id="login" class="card" style="display:none">
    <h1>Адмін-панель Majstr</h1>
    <label for="loginEmail">Email</label>
    <input id="loginEmail" type="email" autocomplete="username">
    <label for="loginPass">Пароль</label>
    <input id="loginPass" type="password" autocomplete="current-password">
    <button id="loginSubmit" class="primary">Увійти</button>
    <div id="loginError" class="error"></div>
</div>

<div id="app" class="container" style="display:none">
    <h1>Адмін-панель</h1>

    <section class="card">
        <div class="grid" id="overview">
            <div class="stat"><div class="label">Завантаження…</div></div>
        </div>
    </section>

    <h2>Воронка активації — де відвалюються майстри</h2>
    <section class="card">
        <div class="grid" id="funnel">
            <div class="stat"><div class="label">Завантаження…</div></div>
        </div>
    </section>

    <h2>Інтерес до PRO (painted door)</h2>
    <section class="card">
        <div class="grid" id="upgradeStats">
            <div class="stat"><div class="label">Завантаження…</div></div>
        </div>
        <p class="muted" id="upgradeByTrigger" style="margin-top:8px"></p>
        <div id="upgradeLeads" style="margin-top:12px"></div>
    </section>

    <h2>Зростання — реєстрації за день</h2>
    <section class="card">
        <canvas id="growthChart" height="110"></canvas>
    </section>

    <h2>Користувачі</h2>
    <section class="card">
        <div class="filters">
            <input id="search" placeholder="Пошук за email / ім'ям / компанією">
            <select id="planFilter">
                <option value="">Усі плани</option>
                <option value="FREE">FREE</option>
                <option value="PRO">PRO</option>
                <option value="TEAM">TEAM</option>
            </select>
            <button id="reload">Оновити</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th title="Email підтверджено">✓</th>
                    <th class="hide-mobile">Ім'я</th>
                    <th title="Об'єкти">Об.</th>
                    <th title="Кошториси (загалом)">Кошт.</th>
                    <th title="Підписані кошториси">Підп.</th>
                    <th>План</th>
                    <th class="hide-mobile">Реєстрація</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
        <div class="pager">
            <button id="prevPage">←</button>
            <span id="pageInfo" style="align-self:center">сторінка 1 / 1</span>
            <button id="nextPage">→</button>
        </div>
    </section>
</div>

<div id="detailOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:50;">
    <div class="card" style="max-width:560px; margin:40px auto; max-height:88vh; overflow:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <h2 id="detailTitle" style="margin:0; text-transform:none; letter-spacing:0;">Користувач</h2>
            <button id="detailClose">✕</button>
        </div>
        <div id="detailBody"></div>
    </div>
</div>

<script>
(function () {
    const API = '/api';
    const STORAGE_KEY = 'majstr.admin.token';

    const dateFormat = new Intl.DateTimeFormat('uk-UA', { dateStyle: 'short', timeStyle: 'short' });
    const dayFormat = new Intl.DateTimeFormat('uk-UA', { day: '2-digit', month: '2-digit' });
    const numberFormat = new Intl.NumberFormat('uk-UA');

    let token = localStorage.getItem(STORAGE_KEY);
    let page = 0;
    let totalPages = 1;
    let chart = null;

    function api(path, opts) {
        const init = Object.assign({ headers: {} }, opts || {});
        if (token) init.headers['Authorization'] = 'Bearer ' + token;
        if (init.body && !init.headers['Content-Type']) init.headers['Content-Type'] = 'application/json';
        return fetch(API + path, init);
    }

    function showLogin(message) {
        document.getElementById('app').style.display = 'none';
        document.getElementById('login').style.display = 'block';
        document.getElementById('loginError').textContent = message || '';
    }

    function showApp() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    document.getElementById('loginSubmit').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPass').value;
        const resp = await fetch(API + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        if (!resp.ok) {
            showLogin('Невірний email або пароль');
            return;
        }
        const data = await resp.json();
        if (data.user && data.user.role !== 'ADMIN') {
            showLogin('У цього користувача немає прав адміністратора');
            return;
        }
        token = data.accessToken;
        localStorage.setItem(STORAGE_KEY, token);
        showApp();
        loadAll();
    });

    async function loadOverview() {
        const resp = await api('/admin/metrics/overview');
        if (resp.status === 401 || resp.status === 403) { logout(); return; }
        const m = await resp.json();
        const planRows = Object.entries(m.planDistribution)
            .map(([plan, n]) => `<div class="stat"><div class="label">План ${plan}</div><div class="value">${n}</div></div>`)
            .join('');
        document.getElementById('overview').innerHTML = `
            <div class="stat"><div class="label">Усього користувачів</div><div class="value">${numberFormat.format(m.usersTotal)}</div></div>
            <div class="stat"><div class="label">Нових сьогодні</div><div class="value">${m.usersNewToday}</div></div>
            <div class="stat"><div class="label">Нових за тиждень</div><div class="value">${m.usersNewThisWeek}</div></div>
            <div class="stat"><div class="label">Нових за місяць</div><div class="value">${m.usersNewThisMonth}</div></div>
            <div class="stat"><div class="label">Активних (30 днів)</div><div class="value">${m.usersActive30d}</div></div>
            <div class="stat"><div class="label">Конверсія в платні</div><div class="value">${m.conversionRatePercent}%</div></div>
            <div class="stat"><div class="label">Churn (з минулого місяця)</div><div class="value">${m.churn.churned}</div><div class="sub">з ${m.churn.activeLastMonth} активних</div></div>
            ${planRows}
        `;
    }

    async function loadFunnel() {
        const resp = await api('/admin/metrics/funnel');
        if (!resp.ok) return;
        const f = await resp.json();
        const reg = f.registered || 0;
        const pct = n => reg === 0 ? 0 : Math.round(n / reg * 100);
        const step = (label, n) => `<div class="stat"><div class="label">${label}</div><div class="value">${n}</div><div class="sub">${pct(n)}% від реєстрацій</div></div>`;
        document.getElementById('funnel').innerHTML =
            step('Зареєструвались', reg) +
            step('Підтвердили email', f.verifiedEmail) +
            step("Створили об'єкт", f.withProject) +
            step('Створили кошторис', f.withEstimate) +
            step('Поділились з клієнтом', f.shared) +
            step('Мають підписаний', f.withSigned);
    }

    async function loadUpgradeInterest() {
        const resp = await api('/admin/metrics/upgrade-interest');
        if (!resp.ok) return;
        const u = await resp.json();
        const stat = (label, n, sub) => `<div class="stat"><div class="label">${label}</div><div class="value">${n}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
        document.getElementById('upgradeStats').innerHTML =
            stat('Унікальних натиснули', u.uniqueClickers, 'ширина попиту') +
            stat('Усього кліків', u.totalClicks, 'інтенсивність/фрустрація') +
            stat('Подали заявку', u.interested, 'теплі ліди');
        const byTrigger = (u.byTrigger || []).map(t => `${escapeHtml(t.trigger)}: ${t.count}`).join(' · ');
        document.getElementById('upgradeByTrigger').textContent = byTrigger ? 'За тригером — ' + byTrigger : '';
        const fmt = iso => iso ? dateFormat.format(new Date(iso)) : '—';
        const leads = u.leads || [];
        document.getElementById('upgradeLeads').innerHTML = leads.length === 0
            ? '<p class="muted">Ще немає заявок.</p>'
            : `<h2 style="text-transform:none; letter-spacing:0;">Теплі ліди — кому подзвонити</h2>
               <table><thead><tr><th>Email</th><th class="hide-mobile">Ім'я</th><th>Що потрібно</th><th>Дата</th></tr></thead><tbody>`
              + leads.map(l => `<tr><td>${escapeHtml(l.email)}</td><td class="hide-mobile">${escapeHtml(l.fullName)}</td><td>${l.reason ? escapeHtml(l.reason) : '<span class="muted">—</span>'}</td><td class="muted">${fmt(l.createdAt)}</td></tr>`).join('')
              + `</tbody></table>`;
    }

    async function loadUserDetail(id) {
        document.getElementById('detailOverlay').style.display = 'block';
        document.getElementById('detailBody').innerHTML = '<p>Завантаження…</p>';
        const resp = await api('/admin/users/' + id);
        if (!resp.ok) {
            document.getElementById('detailBody').innerHTML = '<p class="error">Не вдалося завантажити деталі</p>';
            return;
        }
        const d = await resp.json();
        const yn = b => b ? '✅' : '❌';
        const e = d.estimates;
        const fmt = iso => iso ? dateFormat.format(new Date(iso)) : '—';
        document.getElementById('detailTitle').textContent = d.email;
        document.getElementById('detailBody').innerHTML = `
            <p>Email: ${yn(d.emailVerified)} &nbsp; Трейди: ${(d.trades || []).join(', ') || '—'}</p>
            <p>План: <span class="badge ${d.plan}">${d.plan}</span> &nbsp; Роль: <span class="badge ${d.role}">${d.role}</span></p>
            <p class="muted">Реєстрація: ${fmt(d.createdAt)} &nbsp;·&nbsp; Остання активність: ${fmt(d.lastActiveAt)}</p>
            <h2 style="text-transform:none; letter-spacing:0;">Воронка активації</h2>
            <table>
                <tr><td>Клієнтів</td><td>${d.clientsCount}</td></tr>
                <tr><td>Об'єктів</td><td>${d.projectsCount}</td></tr>
                <tr><td>Кошторисів</td><td>${e.total} <span class="muted">(чернетки ${e.draft} · надіслані ${e.sent} · підписані ${e.signed} · відхилені ${e.rejected})</span></td></tr>
                <tr><td>Поділився хоч раз</td><td>${yn(d.hasShareLink)}</td></tr>
                <tr><td>Має підписаний</td><td>${yn(d.hasSigned)}</td></tr>
                <tr><td>Позицій у каталозі</td><td>${d.catalogItemsCount}</td></tr>
                <tr><td>Завантажив лого</td><td>${yn(d.hasLogo)}</td></tr>
                <tr><td>Останній кошторис</td><td>${fmt(d.lastEstimateCreatedAt)}</td></tr>
                <tr><td>Кліків «Апгрейд»</td><td>${d.upgrade.clicks} <span class="muted">${d.upgrade.clicks > 0 ? '(останній ' + fmt(d.upgrade.lastClickAt) + ')' : ''}</span></td></tr>
                <tr><td>Подав заявку на PRO</td><td>${yn(d.upgrade.interested)}${d.upgrade.interested && d.upgrade.interestReason ? ' <span class="muted">— ' + escapeHtml(d.upgrade.interestReason) + '</span>' : ''}</td></tr>
            </table>
        `;
    }

    async function loadGrowth() {
        const resp = await api('/admin/metrics/growth?period=30d');
        if (!resp.ok) return;
        const data = await resp.json();
        const labels = data.points.map(p => dayFormat.format(new Date(p.day)));
        const values = data.points.map(p => p.count);
        const ctx = document.getElementById('growthChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ label: 'Реєстрації', data: values, backgroundColor: '#1f6feb' }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
            }
        });
    }

    async function loadUsers() {
        const search = document.getElementById('search').value.trim();
        const plan = document.getElementById('planFilter').value;
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (plan) params.set('plan', plan);
        params.set('page', String(page));
        params.set('size', '20');
        const resp = await api('/admin/users?' + params.toString());
        if (!resp.ok) return;
        const data = await resp.json();
        totalPages = Math.max(data.totalPages, 1);
        document.getElementById('pageInfo').textContent =
            `сторінка ${data.page + 1} / ${totalPages} (всього ${data.totalItems})`;
        document.getElementById('usersBody').innerHTML = data.items.map(u => {
            // Unverified masters can't share (the portal gate 403s them), so
            // "active + unverified" == active without sharing → likely PDF-only use.
            const bypass = u.estimatesCount > 0 && !u.emailVerified;
            return `
            <tr>
                <td><a href="#" class="user-link" data-user="${u.id}">${escapeHtml(u.email)}</a>${bypass ? ' <span title="Активний, але email не підтверджено — можливий обхід через PDF (не торкається порталу клієнта)">⚠️</span>' : ''}</td>
                <td>${u.emailVerified ? '✅' : '❌'}</td>
                <td class="hide-mobile">${escapeHtml(u.fullName)}</td>
                <td>${u.projectsCount}</td>
                <td>${u.estimatesCount}</td>
                <td>${u.signedEstimatesCount}</td>
                <td><span class="badge ${u.plan}">${u.plan}</span></td>
                <td class="hide-mobile muted">${dateFormat.format(new Date(u.createdAt))}</td>
                <td>
                    <select data-user="${u.id}" class="plan-select">
                        ${['FREE','PRO','TEAM'].map(p => `<option value="${p}"${p === u.plan ? ' selected' : ''}>${p}</option>`).join('')}
                    </select>
                </td>
            </tr>`;
        }).join('');

        document.querySelectorAll('.user-link').forEach(a => {
            a.addEventListener('click', (ev) => { ev.preventDefault(); loadUserDetail(a.dataset.user); });
        });

        document.querySelectorAll('.plan-select').forEach(sel => {
            sel.addEventListener('change', async (ev) => {
                const id = ev.target.dataset.user;
                const newPlan = ev.target.value;
                const resp = await api(`/admin/users/${id}/plan`, {
                    method: 'PATCH',
                    body: JSON.stringify({ plan: newPlan })
                });
                if (!resp.ok) alert('Не вдалося оновити план');
            });
        });
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function logout() {
        localStorage.removeItem(STORAGE_KEY);
        token = null;
        showLogin('Сесія завершилась, увійдіть знову');
    }

    async function loadAll() {
        try {
            await loadOverview();
            await loadFunnel();
            await loadUpgradeInterest();
            await loadGrowth();
            await loadUsers();
        } catch (e) {
            console.error(e);
        }
    }

    function closeDetail() { document.getElementById('detailOverlay').style.display = 'none'; }
    document.getElementById('detailClose').addEventListener('click', closeDetail);
    document.getElementById('detailOverlay').addEventListener('click', (ev) => {
        if (ev.target.id === 'detailOverlay') closeDetail(); // click backdrop to close
    });

    document.getElementById('reload').addEventListener('click', () => { page = 0; loadUsers(); });
    document.getElementById('search').addEventListener('keyup', e => { if (e.key === 'Enter') { page = 0; loadUsers(); }});
    document.getElementById('planFilter').addEventListener('change', () => { page = 0; loadUsers(); });
    document.getElementById('prevPage').addEventListener('click', () => { if (page > 0) { page--; loadUsers(); }});
    document.getElementById('nextPage').addEventListener('click', () => { if (page < totalPages - 1) { page++; loadUsers(); }});

    if (token) {
        showApp();
        loadAll();
    } else {
        showLogin();
    }
})();
</script>
</body>
</html>
