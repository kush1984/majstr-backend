<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошторис</title>
    <style>
        :root {
            --bg: #f7f7f8;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #1f6feb;
            --accent-text: #ffffff;
            --success: #16a34a;
            --danger: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        header.contractor {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        header.contractor img {
            max-height: 60px;
            max-width: 120px;
        }
        header.contractor .name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        header.contractor .phone {
            color: var(--muted);
            font-size: 0.95rem;
        }
        h2 {
            font-size: 1.05rem;
            margin: 16px 0 8px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        /* Stable column widths so headers and numbers line up regardless
           of the longest line. First column (Назва) takes the remainder. */
        th:nth-child(2), td:nth-child(2) { width: 12%; }
        th:nth-child(3), td:nth-child(3) { width: 14%; }
        th:nth-child(4), td:nth-child(4) { width: 18%; }
        th:nth-child(5), td:nth-child(5) { width: 20%; }
        td:first-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        thead th {
            text-align: left;
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
        }
        tbody td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        th.center, td.center { text-align: center; }
        th.num, td.num { text-align: right; white-space: nowrap; }
        .totals {
            margin-top: 12px;
            display: grid;
            gap: 6px;
        }
        .totals .row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
        }
        .totals .grand {
            font-weight: 700;
            font-size: 1.15rem;
            border-top: 1px solid var(--border);
            padding-top: 8px;
            margin-top: 8px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        button, a.btn {
            font-family: inherit;
            font-size: 1rem;
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        button.primary, a.btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-text);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .signed {
            color: var(--success);
            font-weight: 600;
        }
        .error {
            color: var(--danger);
            padding: 16px;
            text-align: center;
        }
        dialog {
            border: none;
            border-radius: 12px;
            padding: 20px;
            max-width: 420px;
            width: calc(100% - 32px);
        }
        dialog::backdrop { background: rgba(0,0,0,0.4); }
        dialog label {
            display: block;
            margin: 10px 0 4px;
            font-size: 0.9rem;
            color: var(--muted);
        }
        dialog input, dialog textarea {
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        dialog textarea { min-height: 120px; resize: vertical; }
        dialog .dialog-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        @media (max-width: 480px) {
            tbody td, thead th { padding: 6px 4px; font-size: 0.88rem; }
            .actions button, .actions a.btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="root"><p>Завантаження…</p></div>
</div>

<dialog id="signDialog">
    <h3 style="margin-top:0">Підписати кошторис</h3>
    <label for="signName">Ваше ім'я</label>
    <input id="signName" type="text" maxlength="255" required>
    <label for="signPhone">Телефон</label>
    <input id="signPhone" type="tel" maxlength="50" required>
    <div class="dialog-actions">
        <button type="button" data-close="signDialog">Скасувати</button>
        <button type="button" id="signSubmit" class="primary">Підписати</button>
    </div>
</dialog>

<dialog id="questionDialog">
    <h3 style="margin-top:0">Задати питання</h3>
    <label for="qName">Ваше ім'я (необов'язково)</label>
    <input id="qName" type="text" maxlength="255">
    <label for="qPhone">Телефон (необов'язково)</label>
    <input id="qPhone" type="tel" maxlength="50">
    <label for="qMessage">Повідомлення</label>
    <textarea id="qMessage" maxlength="2000" required></textarea>
    <div class="dialog-actions">
        <button type="button" data-close="questionDialog">Скасувати</button>
        <button type="button" id="qSubmit" class="primary">Надіслати</button>
    </div>
</dialog>

<script>
(function () {
    const token = new URLSearchParams(window.location.search).get('t');
    const root = document.getElementById('root');

    if (!token) {
        root.innerHTML = '<div class="error">Невірне посилання</div>';
        return;
    }

    const apiBase = '/api/public/estimates/' + encodeURIComponent(token);

    const moneyFormat = new Intl.NumberFormat('uk-UA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const dateFormat = new Intl.DateTimeFormat('uk-UA', { dateStyle: 'medium' });

    const UNIT_LABEL = {
        M2: 'м²', M: 'м', PIECE: 'шт', KG: 'кг', HOUR: 'год', SET: 'компл'
    };

    function money(value) {
        return moneyFormat.format(Number(value)) + ' грн';
    }

    function unit(code) {
        return UNIT_LABEL[code] || code;
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function renderItems(items, kind) {
        const subset = items.filter(i => i.type === kind);
        if (!subset.length) return '';
        const title = kind === 'WORK' ? 'Роботи' : 'Матеріали';
        const rows = subset.map(i => `
            <tr>
                <td>${escapeHtml(i.name)}</td>
                <td class="center">${escapeHtml(unit(i.unit))}</td>
                <td class="num">${escapeHtml(i.quantity)}</td>
                <td class="num">${money(i.unitPrice)}</td>
                <td class="num">${money(i.lineTotal)}</td>
            </tr>
        `).join('');
        return `
            <section class="card">
                <h2>${title}</h2>
                <table>
                    <thead><tr>
                        <th>Назва</th>
                        <th class="center">Од.</th>
                        <th class="num">К-сть</th>
                        <th class="num">Ціна</th>
                        <th class="num">Сума</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </section>
        `;
    }

    function render(data) {
        const signed = data.signature != null;
        const signedBanner = signed
            ? `<p class="signed">✓ Підписано клієнтом ${data.signature.signerName ? '(' + escapeHtml(data.signature.signerName) + ')' : ''} ${dateFormat.format(new Date(data.signature.signedAt))}</p>`
            : '';

        root.innerHTML = `
            <header class="card contractor">
                ${data.contractor.logoUrl ? `<img alt="logo" src="${escapeHtml(data.contractor.logoUrl)}">` : ''}
                <div>
                    <p class="name">${escapeHtml(data.contractor.companyName)}</p>
                    <p class="phone">${escapeHtml(data.contractor.phone)}</p>
                </div>
            </header>

            <section class="card">
                <h2>Об'єкт</h2>
                <p style="margin:4px 0;"><strong>${escapeHtml(data.project.name)}</strong></p>
                <p style="margin:4px 0;color:var(--muted);">${escapeHtml(data.project.address)}</p>
                ${data.project.clientName ? `<p style="margin:4px 0;">Клієнт: ${escapeHtml(data.project.clientName)}</p>` : ''}
                ${data.validUntil ? `<p style="margin:4px 0;color:var(--muted);">Дійсний до ${dateFormat.format(new Date(data.validUntil))}</p>` : ''}
            </section>

            ${renderItems(data.items, 'WORK')}
            ${renderItems(data.items, 'MATERIAL')}

            <section class="card">
                <div class="totals">
                    <div class="row"><span>Сума робіт:</span><span>${money(data.worksSubtotal)}</span></div>
                    <div class="row"><span>Сума матеріалів:</span><span>${money(data.materialsSubtotal)}</span></div>
                    <div class="row grand"><span>РАЗОМ:</span><span>${money(data.total)}</span></div>
                </div>
            </section>

            ${data.notes ? `<section class="card"><h2>Умови</h2><p>${escapeHtml(data.notes)}</p></section>` : ''}

            <section class="card">
                ${signedBanner}
                <div class="actions">
                    <button id="btnSign" class="primary" ${signed ? 'disabled' : ''}>Підписати</button>
                    <a class="btn" href="${apiBase}/pdf">Завантажити PDF</a>
                    <button id="btnAsk">Задати питання</button>
                </div>
            </section>
        `;

        if (!signed) {
            document.getElementById('btnSign').addEventListener('click', () => openDialog('signDialog'));
        }
        document.getElementById('btnAsk').addEventListener('click', () => openDialog('questionDialog'));
    }

    function openDialog(id) { document.getElementById(id).showModal(); }
    function closeDialog(id) { document.getElementById(id).close(); }

    document.querySelectorAll('[data-close]').forEach(b => {
        b.addEventListener('click', () => closeDialog(b.getAttribute('data-close')));
    });

    document.getElementById('signSubmit').addEventListener('click', async () => {
        const clientName = document.getElementById('signName').value.trim();
        const clientPhone = document.getElementById('signPhone').value.trim();
        if (!clientName || !clientPhone) return;
        const resp = await fetch(apiBase + '/sign', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientName, clientPhone })
        });
        if (resp.ok) {
            closeDialog('signDialog');
            load();
        } else {
            alert('Не вдалося підписати. Спробуйте пізніше.');
        }
    });

    document.getElementById('qSubmit').addEventListener('click', async () => {
        const message = document.getElementById('qMessage').value.trim();
        if (!message) return;
        const body = {
            authorName: document.getElementById('qName').value.trim() || null,
            authorPhone: document.getElementById('qPhone').value.trim() || null,
            message
        };
        const resp = await fetch(apiBase + '/question', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (resp.ok) {
            closeDialog('questionDialog');
            document.getElementById('qMessage').value = '';
            alert('Дякуємо! Підрядник побачить ваше повідомлення.');
        } else {
            alert('Не вдалося надіслати. Спробуйте пізніше.');
        }
    });

    async function load() {
        try {
            const resp = await fetch(apiBase);
            if (!resp.ok) {
                root.innerHTML = '<div class="error">Кошторис не знайдено або посилання прострочене</div>';
                return;
            }
            render(await resp.json());
        } catch (e) {
            root.innerHTML = '<div class="error">Помилка завантаження</div>';
        }
    }

    load();
})();
</script>
</body>
</html>
