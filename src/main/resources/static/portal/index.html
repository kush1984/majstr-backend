<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3a2519">
    <title>Кошторис</title>
    <style>
        /* Majstr brand design system — warm oak-bark + bright amber, the same
           palette as the app and landing. Visual layer only; all classes/ids
           below are exactly what the page script renders, so behaviour is
           unchanged. */
        :root {
            --ink: #3a2519;        /* warm oak bark — dark: header, headings, primary text */
            --ink-2: #4a3122;      /* hover of the dark */
            --paper: #f7f1e7;      /* warm paper — page background */
            --paper-2: #ede2d1;    /* slightly darker paper */
            --line: #d9ccb5;       /* warm border line */
            --amber: #f5821f;      /* bright amber accent — main action, labels */
            --amber-deep: #e06c00; /* richer amber — hover */
            --muted: #705c47;      /* muted warm — secondary text (used inline by the script too) */
            --white: #ffffff;
            --success: #2f7a3f;    /* signed state */
            --danger: #b3402a;     /* error state (warm red) */
            --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: var(--sans);
            background: var(--paper);
            color: var(--ink);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .card {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
            box-shadow: 0 1px 2px rgba(58, 37, 25, 0.05), 0 6px 18px rgba(58, 37, 25, 0.04);
        }
        .card p { margin: 6px 0; color: var(--ink); }
        /* Contractor header — dark oak-bark band with light text. */
        .card.contractor {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: var(--ink);
            border-color: var(--ink);
            color: var(--white);
        }
        .contractor img {
            max-height: 56px;
            max-width: 120px;
            /* White chip so any logo (incl. dark ones) stays visible on the dark band. */
            background: var(--white);
            padding: 6px 8px;
            border-radius: 10px;
        }
        .contractor .name {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            margin: 0;
            color: var(--white);
        }
        .contractor .phone {
            color: #e7d8c4;
            font-family: var(--mono);
            font-size: 0.92rem;
            margin: 4px 0 0;
        }
        /* Section labels ("ОБ'ЄКТ", "РОБОТИ", "МАТЕРІАЛИ", "УМОВИ") — small mono amber. */
        h2 {
            font-family: var(--mono);
            font-size: 0.72rem;
            margin: 0 0 12px;
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        /* Stable column widths so headers and numbers line up regardless
           of the longest line. First column (Назва) takes the remainder. */
        th:nth-child(2), td:nth-child(2) { width: 12%; }
        th:nth-child(3), td:nth-child(3) { width: 14%; }
        th:nth-child(4), td:nth-child(4) { width: 18%; }
        th:nth-child(5), td:nth-child(5) { width: 20%; }
        td:first-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        thead th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            font-weight: 600;
            padding: 6px 8px;
            border-bottom: 1px solid var(--line);
        }
        tbody td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--line);
            font-size: 0.95rem;
            color: var(--ink);
        }
        tbody tr:last-child td { border-bottom: none; }
        th.center, td.center { text-align: center; }
        /* Numbers (qty, price, sum) in monospace with tabular figures so columns align. */
        th.num, td.num {
            text-align: right;
            white-space: nowrap;
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
        }
        .totals {
            margin-top: 4px;
            display: grid;
            gap: 8px;
        }
        .totals .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 1rem;
            color: var(--muted);
        }
        .totals .row span:last-child {
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
            color: var(--ink);
        }
        /* "РАЗОМ" — emphasized with a strong top line. */
        .totals .grand {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--ink);
            border-top: 2px solid var(--ink);
            padding-top: 12px;
            margin-top: 6px;
        }
        .totals .grand span:last-child { color: var(--ink); font-weight: 800; }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 4px;
        }
        button, a.btn {
            font-family: var(--sans);
            font-size: 1rem;
            font-weight: 600;
            padding: 13px 20px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--white);
            color: var(--ink);
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.05s;
        }
        button:hover, a.btn:hover { background: var(--paper-2); }
        button:active, a.btn:active { transform: translateY(1px); }
        /* Primary action ("Підписати кошторис") — bright amber, dark text, prominent. */
        button.primary, a.btn.primary {
            background: var(--amber);
            border-color: var(--amber);
            color: var(--ink);
            font-weight: 800;
            box-shadow: 0 2px 10px rgba(245, 130, 31, 0.25);
        }
        button.primary:hover, a.btn.primary:hover {
            background: var(--amber-deep);
            border-color: var(--amber-deep);
        }
        button:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
        .signed {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--success);
            font-weight: 700;
            background: rgba(47, 122, 63, 0.08);
            border: 1px solid rgba(47, 122, 63, 0.25);
            padding: 8px 12px;
            border-radius: 10px;
            margin: 0 0 12px;
        }
        .error {
            color: var(--danger);
            padding: 8px 0;
            text-align: center;
            font-weight: 600;
            font-size: 1.02rem;
        }
        /* Loading text (the script sets #root to a bare <p> while fetching). */
        #root > p { text-align: center; color: var(--muted); padding: 40px 0; }
        dialog {
            border: none;
            border-radius: 16px;
            padding: 22px;
            max-width: 440px;
            width: calc(100% - 32px);
            background: var(--white);
            color: var(--ink);
            box-shadow: 0 12px 40px rgba(58, 37, 25, 0.25);
        }
        dialog::backdrop { background: rgba(58, 37, 25, 0.45); }
        dialog h3 {
            margin: 0 0 6px;
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: var(--ink);
        }
        dialog label {
            display: block;
            margin: 12px 0 5px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
        }
        dialog input, dialog textarea {
            width: 100%;
            font-family: var(--sans);
            font-size: 1rem;
            padding: 11px 13px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--paper);
            color: var(--ink);
        }
        dialog input:focus, dialog textarea:focus {
            outline: none;
            border-color: var(--amber);
            box-shadow: 0 0 0 3px rgba(245, 130, 31, 0.18);
            background: var(--white);
        }
        dialog textarea { min-height: 120px; resize: vertical; }
        dialog .dialog-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 18px;
        }
        @media (max-width: 480px) {
            .container { padding: 14px 12px 32px; }
            .card { padding: 16px; }
            tbody td, thead th { padding: 7px 5px; font-size: 0.86rem; }
            .actions button, .actions a.btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="root"><p>Завантаження…</p></div>
</div>

<dialog id="signDialog">
    <h3 style="margin-top:0">Підписати кошторис</h3>
    <label for="signName">Ваше ім'я</label>
    <input id="signName" type="text" maxlength="255" required>
    <label for="signPhone">Телефон</label>
    <input id="signPhone" type="tel" maxlength="50" required>
    <div class="dialog-actions">
        <button type="button" data-close="signDialog">Скасувати</button>
        <button type="button" id="signSubmit" class="primary">Підписати</button>
    </div>
</dialog>

<dialog id="questionDialog">
    <h3 style="margin-top:0">Задати питання</h3>
    <label for="qName">Ваше ім'я (необов'язково)</label>
    <input id="qName" type="text" maxlength="255">
    <label for="qPhone">Телефон (необов'язково)</label>
    <input id="qPhone" type="tel" maxlength="50">
    <label for="qMessage">Повідомлення</label>
    <textarea id="qMessage" maxlength="2000" required></textarea>
    <div class="dialog-actions">
        <button type="button" data-close="questionDialog">Скасувати</button>
        <button type="button" id="qSubmit" class="primary">Надіслати</button>
    </div>
</dialog>

<script>
(function () {
    const token = new URLSearchParams(window.location.search).get('t');
    const root = document.getElementById('root');

    if (!token) {
        root.innerHTML = '<div class="error">Невірне посилання</div>';
        return;
    }

    const apiBase = '/api/public/estimates/' + encodeURIComponent(token);

    const moneyFormat = new Intl.NumberFormat('uk-UA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const dateFormat = new Intl.DateTimeFormat('uk-UA', { dateStyle: 'medium' });

    const UNIT_LABEL = {
        M2: 'м²', M: 'м', LINEAR_METER: 'м.п.', PIECE: 'шт', KG: 'кг', HOUR: 'год', SET: 'компл'
    };

    function money(value) {
        return moneyFormat.format(Number(value)) + ' грн';
    }

    function unit(code) {
        return UNIT_LABEL[code] || code;
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function renderItems(items, kind) {
        const subset = items.filter(i => i.type === kind);
        if (!subset.length) return '';
        const title = kind === 'WORK' ? 'Роботи' : 'Матеріали';
        const rows = subset.map(i => `
            <tr>
                <td>${escapeHtml(i.name)}</td>
                <td class="center">${escapeHtml(unit(i.unit))}</td>
                <td class="num">${escapeHtml(i.quantity)}</td>
                <td class="num">${money(i.unitPrice)}</td>
                <td class="num">${money(i.lineTotal)}</td>
            </tr>
        `).join('');
        return `
            <section class="card">
                <h2>${title}</h2>
                <table>
                    <thead><tr>
                        <th>Назва</th>
                        <th class="center">Од.</th>
                        <th class="num">К-сть</th>
                        <th class="num">Ціна</th>
                        <th class="num">Сума</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </section>
        `;
    }

    function render(data) {
        const signed = data.signature != null;
        const signedBanner = signed
            ? `<p class="signed">✓ Підписано клієнтом ${data.signature.signerName ? '(' + escapeHtml(data.signature.signerName) + ')' : ''} ${dateFormat.format(new Date(data.signature.signedAt))}</p>`
            : '';

        root.innerHTML = `
            <header class="card contractor">
                ${data.contractor.logoUrl ? `<img alt="logo" src="${escapeHtml(data.contractor.logoUrl)}">` : ''}
                <div>
                    <p class="name">${escapeHtml(data.contractor.companyName)}</p>
                    <p class="phone">${escapeHtml(data.contractor.phone)}</p>
                </div>
            </header>

            <section class="card">
                <h2>Об'єкт</h2>
                <p style="margin:4px 0;"><strong>${escapeHtml(data.project.name)}</strong></p>
                <p style="margin:4px 0;color:var(--muted);">${escapeHtml(data.project.address)}</p>
                ${data.project.clientName ? `<p style="margin:4px 0;">Клієнт: ${escapeHtml(data.project.clientName)}</p>` : ''}
                ${data.validUntil ? `<p style="margin:4px 0;color:var(--muted);">Дійсний до ${dateFormat.format(new Date(data.validUntil))}</p>` : ''}
            </section>

            ${renderItems(data.items, 'WORK')}
            ${renderItems(data.items, 'MATERIAL')}

            <section class="card">
                <div class="totals">
                    <div class="row"><span>Сума робіт:</span><span>${money(data.worksSubtotal)}</span></div>
                    <div class="row"><span>Сума матеріалів:</span><span>${money(data.materialsSubtotal)}</span></div>
                    <div class="row grand"><span>РАЗОМ:</span><span>${money(data.total)}</span></div>
                </div>
            </section>

            ${data.notes ? `<section class="card"><h2>Умови</h2><p>${escapeHtml(data.notes)}</p></section>` : ''}

            <section class="card">
                ${signedBanner}
                <div class="actions">
                    <button id="btnSign" class="primary" ${signed ? 'disabled' : ''}>Підписати</button>
                    <a class="btn" href="${apiBase}/pdf">Завантажити PDF</a>
                    <button id="btnAsk">Задати питання</button>
                </div>
            </section>
        `;

        if (!signed) {
            document.getElementById('btnSign').addEventListener('click', () => openDialog('signDialog'));
        }
        document.getElementById('btnAsk').addEventListener('click', () => openDialog('questionDialog'));
    }

    function openDialog(id) { document.getElementById(id).showModal(); }
    function closeDialog(id) { document.getElementById(id).close(); }

    document.querySelectorAll('[data-close]').forEach(b => {
        b.addEventListener('click', () => closeDialog(b.getAttribute('data-close')));
    });

    // Backend ErrorResponse bodies carry localized, user-friendly messages —
    // show them when present, fall back to a generic text otherwise.
    async function apiMessage(resp) {
        try {
            const data = await resp.json();
            return data && data.message ? data.message : null;
        } catch (e) {
            return null;
        }
    }

    // A failure on this page lands on the CONTRACTOR's reputation — never show
    // a blank screen or a raw error. Retryable failures get a retry button;
    // a dead link tells the client to ask the contractor for a fresh one.
    function showError(message, canRetry) {
        root.innerHTML = `
            <div class="card">
                <div class="error">${escapeHtml(message)}</div>
                ${canRetry ? '<div class="actions" style="justify-content:center"><button id="btnRetry" class="primary">Спробувати ще раз</button></div>' : ''}
            </div>
        `;
        if (canRetry) {
            document.getElementById('btnRetry').addEventListener('click', () => {
                root.innerHTML = '<p>Завантаження…</p>';
                load();
            });
        }
    }

    document.getElementById('signSubmit').addEventListener('click', async () => {
        const clientName = document.getElementById('signName').value.trim();
        const clientPhone = document.getElementById('signPhone').value.trim();
        if (!clientName || !clientPhone) return;
        let resp;
        try {
            resp = await fetch(apiBase + '/sign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientName, clientPhone })
            });
        } catch (e) {
            alert('Немає з\'єднання. Перевірте інтернет і спробуйте ще раз.');
            return;
        }
        if (resp.ok) {
            closeDialog('signDialog');
            load();
        } else if (resp.status === 409) {
            // Already signed (e.g. opened in two tabs) — reload to show the signature.
            closeDialog('signDialog');
            alert(await apiMessage(resp) || 'Кошторис уже підписано.');
            load();
        } else {
            alert(await apiMessage(resp) || 'Не вдалося підписати. Спробуйте пізніше.');
        }
    });

    document.getElementById('qSubmit').addEventListener('click', async () => {
        const message = document.getElementById('qMessage').value.trim();
        if (!message) return;
        const body = {
            authorName: document.getElementById('qName').value.trim() || null,
            authorPhone: document.getElementById('qPhone').value.trim() || null,
            message
        };
        let resp;
        try {
            resp = await fetch(apiBase + '/question', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
        } catch (e) {
            // The typed message stays in the dialog — nothing is lost.
            alert('Немає з\'єднання. Перевірте інтернет і спробуйте ще раз.');
            return;
        }
        if (resp.ok) {
            closeDialog('questionDialog');
            document.getElementById('qMessage').value = '';
            alert('Дякуємо! Підрядник побачить ваше повідомлення.');
        } else {
            alert(await apiMessage(resp) || 'Не вдалося надіслати. Спробуйте пізніше.');
        }
    });

    async function load() {
        try {
            const resp = await fetch(apiBase);
            if (resp.status === 404) {
                showError('Посилання недійсне або прострочене. Зверніться до вашого майстра за новим посиланням.', false);
                return;
            }
            if (!resp.ok) {
                showError('Не вдалося завантажити кошторис. Спробуйте ще раз за хвилину.', true);
                return;
            }
            render(await resp.json());
        } catch (e) {
            showError('Не вдалося завантажити кошторис. Перевірте інтернет-з\'єднання і спробуйте ще раз.', true);
        }
    }

    load();
})();
</script>
</body>
</html>
