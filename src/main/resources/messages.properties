# Base bundle = UKRAINIAN (the product language). Every locale without its own
# bundle falls back here. English lives in messages_en.properties.
# NOTE: values used with arguments go through java.text.MessageFormat —
# apostrophes there must be doubled ('').

# --- generic errors (GlobalExceptionHandler) ---------------------------------
error.validation-failed=Перевірте правильність заповнення полів
error.malformed-json=Некоректний формат запиту
error.bad-credentials=Невірний email або пароль
error.auth-failed=Помилка автентифікації
error.session-invalid=Сесія недійсна або прострочена. Увійдіть знову.
error.access-denied=Доступ заборонено
error.email-taken=Цей email вже зареєстровано
error.not-found=Запис не знайдено
error.internal=Внутрішня помилка сервера. Спробуйте пізніше.
error.conflict.concurrent=Дані щойно змінилися. Оновіть сторінку і спробуйте ще раз.

# --- uploads ------------------------------------------------------------------
error.upload.empty=Файл порожній або пошкоджений
error.upload.type=Приймаються лише зображення PNG або JPEG
error.upload.too-large=Файл завеликий

# --- estimates ----------------------------------------------------------------
error.estimate.signed=Кошторис підписано клієнтом і більше не може змінюватися. Створіть новий кошторис.
error.estimate.manual-sign=Кошторис може підписати лише клієнт через посилання на портал

# --- email verification / sharing ----------------------------------------------
error.email-not-verified=Підтвердіть email щоб надсилати кошториси клієнтам
error.client-email-missing=У клієнта не вказано email
error.verification.invalid=Посилання недійсне або прострочене. Запросіть новий лист.

# --- plans & limits (MessageFormat: '' = apostrophe) ----------------------------
error.feature.unavailable=Функція {0} недоступна на плані {1}. Доступно у плані {2} або вищому.
error.limit.projects=Ви досягли ліміту у {0} {1} на безкоштовному плані. Оновіть до PRO для необмеженої кількості об''єктів.
plural.projects.one=об'єкт
plural.projects.few=об'єкти
plural.projects.many=об'єктів
error.limit.estimates=Ви досягли ліміту у {0} {1} на цьому об''єкті на безкоштовному плані. Оновіть до PRO для необмеженої кількості.
plural.estimates.one=кошторис
plural.estimates.few=кошториси
plural.estimates.many=кошторисів

# --- rate limits ----------------------------------------------------------------
error.rate.login=Забагато спроб входу. Спробуйте пізніше.
error.rate.register=Забагато реєстрацій з вашої адреси. Спробуйте пізніше.
error.rate.portal=Забагато запитів. Спробуйте пізніше.
error.rate.estimate-email=Забагато листів за годину. Спробуйте трохи пізніше.
error.rate.verification-resend=Зачекайте перед повторним надсиланням листа.

# --- push notifications (contractor-facing, always product language) ------------
push.estimate-signed={0} підписав(ла) кошторис на {1}
