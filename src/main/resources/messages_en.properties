# English bundle — served only on an explicit Accept-Language: en.
# Keep keys in sync with messages.properties (Ukrainian base).

# --- generic errors (GlobalExceptionHandler) ---------------------------------
error.validation-failed=Please check the highlighted fields
error.malformed-json=Malformed request
error.bad-credentials=Invalid email or password
error.auth-failed=Authentication failed
error.session-invalid=Session is invalid or expired. Please sign in again.
error.access-denied=Access denied
error.email-taken=This email is already registered
error.not-found=Record not found
error.internal=Internal server error. Please try again later.
error.conflict.concurrent=The data was just changed. Refresh the page and try again.

# --- uploads ------------------------------------------------------------------
error.upload.empty=The file is empty or corrupted
error.upload.type=Only PNG or JPEG images are accepted
error.upload.too-large=The file is too large

# --- estimates ----------------------------------------------------------------
error.estimate.signed=This estimate has been signed by the client and can no longer be modified. Create a new estimate instead.
error.estimate.manual-sign=An estimate can only be signed by the client via the portal link
error.estimate.not-signed-reopen=Only a signed estimate can be reopened.

# --- email verification / sharing ----------------------------------------------
error.email-not-verified=Verify your email to send estimates to clients
error.client-email-missing=The client has no email on file
error.verification.invalid=The link is invalid or expired. Request a new email.

# --- plans & limits --------------------------------------------------------------
error.feature.unavailable=The {0} feature is not available on the {1} plan. Available on {2} or higher.
error.limit.projects=You have reached the limit of {0} {1} on the free plan. Upgrade to PRO for unlimited projects.
plural.projects.one=project
plural.projects.few=projects
plural.projects.many=projects
error.limit.estimates=You have reached the limit of {0} {1} per project on the free plan. Upgrade to PRO for unlimited.
plural.estimates.one=estimate
plural.estimates.few=estimates
plural.estimates.many=estimates

# --- rate limits ----------------------------------------------------------------
error.rate.login=Too many login attempts. Try again later.
error.rate.register=Too many registrations from your address. Try again later.
error.rate.portal=Too many requests. Try again later.
error.rate.estimate-email=Too many emails this hour. Try again a bit later.
error.rate.verification-resend=Please wait before requesting another email.

# --- push notifications -----------------------------------------------------------
push.estimate-signed={0} signed the estimate for {1}
push.question.title=New question from the client
