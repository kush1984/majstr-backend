spring:
  application:
    name: majstr-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/majstr}
    username: ${DB_USERNAME:majstr}
    password: ${DB_PASSWORD:majstr}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  web:
    error:
      include-message: never
      include-stacktrace: never

server:
  # Railway (and most PaaS) inject the listen port via $PORT — bind it so the
  # platform's health/router reaches the app. Falls back to 8080 locally.
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        # Only health is reachable — no env/beans/mappings leak.
        include: health
  endpoint:
    health:
      # Never expose component details (DB url, validation queries) to anonymous
      # callers. The aggregate status still reflects every indicator, so a DB
      # outage flips the top-level status to DOWN without leaking internals.
      show-details: never
      probes:
        enabled: true
      group:
        # Readiness fails when the DB is unreachable so an orchestrator stops
        # routing traffic to a pod that can't serve requests.
        readiness:
          include: readinessState,db
  health:
    db:
      enabled: true

spring.servlet.multipart:
  max-file-size: 2MB
  max-request-size: 4MB

app:
  jwt:
    # HS256 requires >= 32 bytes (256 bits). Set via env in all environments.
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: 15
    # Session length for the contractor (a daily work tool). Safe to keep long
    # because refresh tokens rotate on every use. Override with REFRESH_TOKEN_TTL_DAYS.
    refresh-token-expiration-days: ${REFRESH_TOKEN_TTL_DAYS:30}
    issuer: majstr-backend
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  rate-limit:
    login:
      max-attempts: 5
      window-minutes: 15
    register:
      max-attempts: 5
      window-minutes: 60
    portal:
      max-attempts: 30
      window-minutes: 1
    verification:
      cooldown-seconds: 60
    estimate-email:
      max-per-hour: 20
  storage:
    # local = filesystem (dev default); s3 = any S3-compatible store (Cloudflare R2).
    kind: ${STORAGE_KIND:local}
    local:
      directory: ${STORAGE_DIR:./data/uploads}
    s3:
      # Only read when kind=s3. Credentials are env only, blank in dev.
      endpoint: ${R2_ENDPOINT:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      region: ${R2_REGION:auto}
  portal:
    public-base-url: ${PORTAL_BASE_URL:http://localhost:8080}
  email:
    # Resend API key — env only, blank in local dev (then email is logged & skipped).
    resend-api-key: ${RESEND_API_KEY:}
    from-address: ${EMAIL_FROM:Majstr <onboarding@resend.dev>}
    # Base URL of the PWA — the verify link points here: {app-url}/verify-email?token=...
    app-url: ${APP_URL:http://localhost:5173}
  push:
    # Web Push (VAPID). Keys are env only and blank in local dev (then a push is
    # logged & skipped). Generate a stable keypair once for production — rotating
    # it invalidates every existing browser subscription. See README.
    vapid:
      public-key: ${VAPID_PUBLIC_KEY:}
      private-key: ${VAPID_PRIVATE_KEY:}
      subject: ${VAPID_SUBJECT:mailto:admin@majstr.app}
  sentry:
    # Error monitoring. DSN is env only and blank in local dev (then Sentry is
    # disabled — nothing is sent, no noise). PII is never sent (send-default-pii
    # stays off); only an opaque user id and the endpoint are attached.
    dsn: ${SENTRY_DSN:}
    environment: ${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:dev}}
    # Fraction of transactions sampled for performance tracing. 0 = errors only.
    traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  admin:
    # First-admin auto-seed. Both blank in dev → no-op. Set via env on a fresh
    # prod DB to create the initial ADMIN; ignored once any ADMIN exists.
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
