spring:
  application:
    name: majstr-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/majstr}
    username: ${DB_USERNAME:majstr}
    password: ${DB_PASSWORD:majstr}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  web:
    error:
      include-message: never
      include-stacktrace: never

server:
  port: 8080

app:
  jwt:
    # HS256 requires >= 32 bytes (256 bits). Set via env in all environments.
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7
    issuer: majstr-backend
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  rate-limit:
    login:
      max-attempts: 5
      window-minutes: 15

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
