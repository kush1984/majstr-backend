services:
  postgres:
    image: postgres:17-alpine
    container_name: majstr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-majstr}
      POSTGRES_USER: ${POSTGRES_USER:-majstr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - majstr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-majstr} -d ${POSTGRES_DB:-majstr}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  majstr_pgdata:
    name: majstr_pgdata
